name: Security Hardening Strategy
project_name: Financial Platform
project_type: security_compliance
domain: fintech
goal: security-compliance

goals:
- Achieve SOC 2 Type II compliance
- Implement zero-trust architecture
- Reduce security vulnerabilities by 90%
- Establish comprehensive audit logging
- Implement end-to-end encryption
- Set up security monitoring and incident response

quality_gates:
- metric: Vulnerability scan
  threshold: '0 critical/high vulnerabilities'
- metric: Security test coverage
  threshold: '>= 90% of security requirements tested'
- metric: Audit completeness
  threshold: '100% of actions auditable'
- metric: Incident response time
  threshold: '<= 15 minutes detection, 1 hour containment'
- metric: Compliance score
  threshold: '>= 95% SOC 2 requirements met'
- metric: Encryption coverage
  threshold: '100% of sensitive data encrypted at rest and in transit'

sprints:
- id: sprint-1
  name: Security Foundation
  duration: 2 weeks
  objectives:
  - Implement identity and access management (IAM)
  - Set up multi-factor authentication (MFA)
  - Establish role-based access control (RBAC)
  - Implement secure credential management
  - Create security policies and procedures
  
  task_patterns:
  - name: IAM implementation
    description: Deploy centralized identity management
    task_type: security
    priority: critical
    model_hints:
      planning: premium
      implementation: premium
    acceptance_criteria:
    - SSO integration complete
    - MFA enforced for all users
    - Role hierarchy defined
    
  - name: Secrets management
    description: Implement vault for secure storage
    task_type: security
    priority: critical
    model_hints:
      planning: premium
      implementation: premium
    acceptance_criteria:
    - Vault deployed and configured
    - All secrets migrated
    - Rotation policies active

- id: sprint-2
  name: Data Protection
  duration: 3 weeks
  objectives:
  - Implement end-to-end encryption
  - Set up data loss prevention (DLP)
  - Classify sensitive data
  - Implement field-level encryption
  - Create data retention policies
  
  task_patterns:
  - name: Encryption implementation
    description: Encrypt all sensitive data
    task_type: security
    priority: critical
    model_hints:
      planning: premium
      implementation: premium
    acceptance_criteria:
    - Database encryption enabled
    - Application-level encryption
    - Key management established
    
  - name: Data classification
    description: Identify and label sensitive data
    task_type: analysis
    priority: high
    model_hints:
      planning: premium
      implementation: balanced
    acceptance_criteria:
    - Data catalog created
    - Classification rules defined
    - Automated tagging active

- id: sprint-3
  name: Network Security
  duration: 2 weeks
  objectives:
  - Implement zero-trust network architecture
  - Set up web application firewall (WAF)
  - Configure DDoS protection
  - Implement micro-segmentation
  - Establish VPN and secure access
  
  task_patterns:
  - name: Zero-trust implementation
    description: Never trust, always verify
    task_type: security
    priority: critical
    model_hints:
      planning: premium
      implementation: premium
    acceptance_criteria:
    - Micro-segments created
    - Service mesh secured
    - Mutual TLS enabled
    
  - name: WAF configuration
    description: Protect against web attacks
    task_type: security
    priority: high
    model_hints:
      planning: balanced
      implementation: balanced
    acceptance_criteria:
    - OWASP rules configured
    - Custom rules tuned
    - False positives minimized

- id: sprint-4
  name: Monitoring and Compliance
  duration: 3 weeks
  objectives:
  - Implement security information and event management (SIEM)
  - Set up automated security testing
  - Conduct penetration testing
  - Prepare for SOC 2 audit
  - Create incident response playbook
  
  task_patterns:
  - name: SIEM implementation
    description: Centralized security monitoring
    task_type: monitoring
    priority: critical
    model_hints:
      planning: premium
      implementation: premium
    acceptance_criteria:
    - Log collection active
    - Correlation rules configured
    - Dashboard operational
    
  - name: Security testing pipeline
    description: Integrate security into CI/CD
    task_type: automation
    priority: high
    model_hints:
      planning: premium
      implementation: balanced
    acceptance_criteria:
    - SAST/DAST integrated
    - Dependency scanning active
    - Container security enabled

tasks:
  critical_refactors:
  - name: Refactor authentication system
    description: Move to OAuth 2.0/OpenID Connect
    estimated_hours: 80
    complexity: high
    
  - name: Implement secure session management
    description: Prevent session hijacking
    estimated_hours: 40
    complexity: high
    
  standard_refactors:
  - name: Sanitize user inputs
    description: Prevent injection attacks
    estimated_hours: 60
    complexity: medium
    
  - name: Implement rate limiting
    description: Prevent brute force attacks
    estimated_hours: 24
    complexity: low
    
  test_writing:
  - name: Security test suite
    description: Comprehensive security tests
    estimated_hours: 120
    complexity: high
    
  - name: Penetration testing
    description: External security assessment
    estimated_hours: 80
    complexity: high
    
  documentation:
  - name: Security policies
    description: Document all security procedures
    estimated_hours: 40
    complexity: medium
    
  - name: Compliance evidence
    description: Prepare SOC 2 documentation
    estimated_hours: 60
    complexity: medium

metrics:
  target:
    vulnerabilities_reduced: 90
    security_test_coverage: 90
    audit_events: 100
    encryption_coverage: 100
  quality:
    soc2_compliance: 95
    incident_response_mttr: 60
    false_positive_rate: 5
    user_satisfaction: 90
