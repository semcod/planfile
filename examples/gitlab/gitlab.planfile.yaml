# GitLab Integration Configuration
# This file contains GitLab-specific integration settings

integrations:
  gitlab:
    # GitLab instance URL
    # Can be overridden by GITLAB_URL environment variable
    url: "https://gitlab.com"
    
    # Project ID (numeric, not namespace/project-name)
    # Can be overridden by GITLAB_PROJECT_ID environment variable
    project_id: 123456
    
    # GitLab token (automatically loaded from GITLAB_TOKEN env var)
    # token: "${GITLAB_TOKEN}"
    
    # Sync settings
    sync:
      # Sync planfile tickets to GitLab issues
      create_issues: true
      
      # Sync GitLab issues back to planfile
      import_issues: true
      
      # Labels to add to created issues
      default_labels: ["planfile", "managed"]
      
      # Map planfile priorities to GitLab labels
      priority_labels:
        critical: "priority::critical"
        high: "priority::high"
        normal: "priority::normal"
        low: "priority::low"
      
      # Map planfile statuses to GitLab labels
      status_labels:
        open: null
        in_progress: "status::in-progress"
        review: "status::review"
        done: "status::done"
        blocked: "status::blocked"
