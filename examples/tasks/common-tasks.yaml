# Common task patterns that can be reused across strategies

patterns:
  - id: "setup-ci-cd"
    type: "tech_debt"
    title: "Set up CI/CD pipeline"
    description: |
      Configure continuous integration and deployment:
      - Automated testing on push
      - Build and deployment pipeline
      - Environment management
      - Rollback procedures
      - Monitoring and alerts
    priority: "high"
    estimate: "3d"
    labels: ["devops", "automation"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"

  - id: "unit-tests"
    type: "tech_debt"
    title: "Write comprehensive unit tests"
    description: |
      Add unit test coverage for:
      - Core business logic
      - API endpoints
      - Utility functions
      - Data models
      - Error handling
    priority: "medium"
    estimate: "5d"
    labels: ["testing", "quality"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"

  - id: "api-documentation"
    type: "documentation"
    title: "Create API documentation"
    description: |
      Document all API endpoints:
      - OpenAPI/Swagger specification
      - Request/response examples
      - Authentication details
      - Error codes
      - Rate limiting info
    priority: "medium"
    estimate: "2d"
    labels: ["documentation", "api"]
    model_hints:
      design: "balanced"
      implementation: "low"
      review: "low"

  - id: "performance-optimization"
    type: "tech_debt"
    title: "Optimize application performance"
    description: |
      Improve performance metrics:
      - Database query optimization
      - Caching implementation
      - Asset optimization
      - Lazy loading
      - Bundle size reduction
    priority: "medium"
    estimate: "4d"
    labels: ["performance", "optimization"]
    model_hints:
      design: "balanced"
      implementation: "premium"
      review: "balanced"

  - id: "security-audit"
    type: "tech_debt"
    title: "Conduct security audit"
    description: |
      Perform comprehensive security review:
      - Dependency vulnerability scan
      - Code security review
      - Penetration testing
      - Access control review
      - Data encryption verification
    priority: "high"
    estimate: "3d"
    labels: ["security", "audit"]
    model_hints:
      design: "premium"
      implementation: "balanced"
      review: "premium"

  - id: "error-handling"
    type: "tech_debt"
    title: "Implement comprehensive error handling"
    description: |
      Add robust error handling:
      - Global error handlers
      - User-friendly error messages
      - Error logging and monitoring
      - Graceful degradation
      - Retry mechanisms
    priority: "medium"
    estimate: "3d"
    labels: ["error-handling", "reliability"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"

  - id: "monitoring-dashboard"
    type: "feature"
    title: "Set up monitoring and alerting"
    description: |
      Implement monitoring solution:
      - Application metrics
      - System health checks
      - Custom dashboards
      - Alert configuration
      - Log aggregation
    priority: "high"
    estimate: "4d"
    labels: ["monitoring", "observability"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"

  - id: "data-migration"
    type: "tech_debt"
    title: "Create data migration scripts"
    description: |
      Develop migration utilities:
      - Database schema migrations
      - Data transformation scripts
      - Rollback capabilities
      - Migration testing
      - Zero-downtime deployment
    priority: "high"
    estimate: "3d"
    labels: ["database", "migration"]
    model_hints:
      design: "balanced"
      implementation: "premium"
      review: "premium"

  - id: "mobile-responsive"
    type: "feature"
    title: "Ensure mobile responsiveness"
    description: |
      Optimize for mobile devices:
      - Responsive design implementation
      - Touch-friendly interactions
      - Mobile performance optimization
      - Cross-browser testing
      - PWA features
    priority: "high"
    estimate: "5d"
    labels: ["mobile", "responsive"]
    model_hints:
      design: "premium"
      implementation: "balanced"
      review: "balanced"

  - id: "accessibility-audit"
    type: "tech_debt"
    title: "Conduct accessibility audit"
    description: |
      Ensure WCAG compliance:
      - Screen reader testing
      - Keyboard navigation
      - Color contrast verification
      - ARIA labels implementation
      - Accessibility documentation
    priority: "medium"
    estimate: "3d"
    labels: ["accessibility", "a11y"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"

  - id: "code-review-process"
    type: "tech_debt"
    title: "Establish code review process"
    description: |
      Set up code review workflow:
      - Review guidelines
      - Pull request templates
      - Automated checks
      - Reviewer assignment
      - Quality metrics
    priority: "medium"
    estimate: "2d"
    labels: ["process", "quality"]
    model_hints:
      design: "balanced"
      implementation: "low"
      review: "low"

  - id: "feature-flags"
    type: "feature"
    title: "Implement feature flag system"
    description: |
      Add feature toggling capability:
      - Feature flag service
      - Admin interface
      - User targeting
      - Performance metrics
      - Gradual rollout
    priority: "medium"
    estimate: "4d"
    labels: ["feature-flags", "deployment"]
    model_hints:
      design: "balanced"
      implementation: "balanced"
      review: "balanced"
