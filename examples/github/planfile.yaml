# GitHub Integration Example
# This example demonstrates planfile integration with GitHub Issues API

name: GitHub Integration Demo
version: 1.0.0
project_type: library
domain: devtools
description: Example project showing GitHub ticket synchronization with automated CI/CD workflows
goal:
  short: Demonstrate planfile integration with GitHub Issues API for automated ticket management
  quality:
    - Clean integration patterns
    - Well-documented examples
    - Tested workflows
  delivery:
    - Working GitHub sync examples
    - CI/CD pipeline integration
  metrics:
    - Successful ticket sync
    - Pipeline pass rate

sprints:
  - id: 1
    name: Setup & Configuration
    length_days: 7
    duration: 1 week
    objectives:
      - Configure GitHub API authentication
      - Set up planfile GitHub backend
      - Test basic connectivity
    tasks: []

  - id: 2
    name: Ticket Management
    length_days: 14
    duration: 2 weeks
    objectives:
      - Implement ticket creation workflows
      - Add ticket synchronization
      - Handle update scenarios
    tasks: []

  - id: 3
    name: CI/CD Integration
    length_days: 7
    duration: 1 week
    objectives:
      - Integrate with GitHub Actions
      - Set up automated workflows
      - Document usage patterns
    tasks: []

tasks:
  patterns: []

quality_gates:
  - name: GitHub API Connectivity
    description: Successfully connect to GitHub API
    criteria:
      - API authentication works
      - Rate limits respected
    required: true

  - name: Ticket Sync Validation
    description: Tickets sync correctly between planfile and GitHub
    criteria:
      - Create/update/delete operations work
      - Status mapping is correct
    required: true

  - name: Documentation Complete
    description: README and examples are clear
    criteria:
      - Setup instructions work
      - Code examples run successfully
    required: true

metadata:
  model_tier: cheap
  focus: integration
  example_type: github_integration
  repo: "semcod/planfile"
  default_labels:
    - "planfile"
    - "managed"
