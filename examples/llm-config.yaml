# LLM Provider Configuration for Planfile Testing
# Copy this file to config.yaml and update with your API keys

providers:
  # OpenAI
  openai:
    enabled: true
    api_key: ${OPENAI_API_KEY}  # Set environment variable
    base_url: https://api.openai.com/v1
    models:
      - name: gpt-4-turbo-preview
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.03
      - name: gpt-3.5-turbo
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.002
    recommended_for:
      - strategy_generation
      - code_review

  # Anthropic via OpenRouter
  anthropic-openrouter:
    enabled: true
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    models:
      - name: anthropic/claude-3-opus
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.015
        strengths: [detailed_analysis, complex_reasoning]
      - name: anthropic/claude-3-sonnet
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.003
        strengths: [balanced, code_generation]
      - name: anthropic/claude-3-haiku
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.00025
        strengths: [fast, cost_effective]
    recommended_for:
      - strategy_generation
      - quick_reviews

  # Google
  google:
    enabled: true
    api_key: ${GOOGLE_API_KEY}
    base_url: https://generativelanguage.googleapis.com/v1
    models:
      - name: gemini-pro
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.0005
    recommended_for:
      - brainstorming
      - documentation

  # Local Ollama
  ollama:
    enabled: true
    base_url: http://localhost:11434
    models:
      - name: llama2
        type: completion
        max_tokens: 4000
        cost_per_1k_tokens: 0
      - name: codellama
        type: completion
        max_tokens: 4000
        cost_per_1k_tokens: 0
        strengths: [code_focused]
      - name: mistral
        type: completion
        max_tokens: 4000
        cost_per_1k_tokens: 0
    recommended_for:
      - local_testing
      - privacy_sensitive

  # LM Studio / Local OpenAI-compatible
  lm-studio:
    enabled: true
    base_url: http://localhost:1234/v1
    api_key: not-required
    models:
      - name: local-model
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0
    recommended_for:
      - local_testing
      - custom_models

  # Together AI
  together:
    enabled: true
    api_key: ${TOGETHER_AI_API_KEY}
    base_url: https://api.together.xyz/v1
    models:
      - name: meta-llama/Llama-2-70b-chat-hf
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.0009
      - name: mistralai/Mixtral-8x7B-Instruct-v0.1
        type: chat
        max_tokens: 4000
        cost_per_1k_tokens: 0.0006
    recommended_for:
      - cost_effective_generation
      - open_source_models

# Test configurations
test_scenarios:
  strategy_generation:
    prompt_type: structured_yaml
    evaluation_criteria:
      - yaml_validity
      - strategy_completeness
      - sprint_quality
      - task_detail
    models_to_test:
      - anthropic/claude-3-sonnet
      - gpt-4-turbo-preview
      - anthropic/claude-3-haiku

  code_review:
    prompt_type: code_analysis
    evaluation_criteria:
      - accuracy
      - actionability
      - clarity
    models_to_test:
      - gpt-4-turbo-preview
      - anthropic/claude-3-opus
      - codellama

  quick_tasks:
    prompt_type: simple_qa
    evaluation_criteria:
      - speed
      - accuracy
      - conciseness
    models_to_test:
      - anthropic/claude-3-haiku
      - gpt-3.5-turbo
      - mistral

# Performance benchmarks
benchmarks:
  response_time:
    excellent: < 2s
    good: 2-5s
    acceptable: 5-10s
    poor: > 10s
  
  token_efficiency:
    excellent: > 2000 tokens/response
    good: 1000-2000 tokens/response
    acceptable: 500-1000 tokens/response
    poor: < 500 tokens/response
  
  cost_effectiveness:
    excellent: < $0.01 per generation
    good: $0.01-0.05 per generation
    acceptable: $0.05-0.10 per generation
    poor: > $0.10 per generation

# Output configuration
output:
  save_responses: true
  save_metrics: true
  generate_report: true
  output_dir: ./test-results
  report_formats:
    - markdown
    - json
    - html
